<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Live tracking · Dromeas</title>
<meta name="description" content="Follow the race live — position, pace, heart rate and conditions, in real time." />
<meta name="theme-color" content="#0b1220" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script>
  /* Resolve the theme before first paint to avoid a flash of the wrong scheme. */
  (function(){try{
    var p=localStorage.getItem("dromeas_track_theme")||"system";
    var r=(p==="light"||p==="dark")?p
         :((window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");
    document.documentElement.setAttribute("data-theme",r);
  }catch(e){}})();
</script>
<style>
  :root{
    --bg:#0b1220; --bg2:#0f1a2e; --card:#131f36; --card2:#182642;
    --line:#22314f; --text:#eaf0fb; --dim:#9fb0cc; --faint:#6b7d9c;
    --accent:#2f7df6; --accent2:#4f9dff; --live:#ff4b57; --ok:#33d69f;
    --temp:#e0851a; --humid:#3389db; --gluc:#7d73dc; --hr:#ff5a7a;
    --inset:#0c1730; --glow:#16264a;
    --r:18px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#eef3fb; --bg2:#e4ecf7; --card:#ffffff; --card2:#f2f7fd;
    --line:#dae3f1; --text:#101a2c; --dim:#4a5c78; --faint:#8090aa;
    --accent:#2f7df6; --accent2:#2f7df6; --live:#e5384a; --ok:#1fa97f;
    --temp:#c9700c; --humid:#2372c0; --gluc:#6a5fd0; --hr:#e5455f;
    --inset:#eaf1fb; --glow:#d6e5fb;
    --shadow:0 10px 28px rgba(31,54,92,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 800px at 50% -10%, var(--glow) 0%, var(--bg) 55%) fixed, var(--bg);
    color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition:background-color .2s ease, color .2s ease;
  }
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 40px}
  a{color:var(--accent2);text-decoration:none}

  /* Header */
  .top{display:flex;align-items:center;gap:10px;margin:6px 2px 18px;flex-wrap:wrap}
  .brand{font-weight:800;letter-spacing:.2px;font-size:15px;color:var(--dim)}
  .brand b{color:var(--text)}
  .status{margin-left:auto;display:inline-flex;align-items:center;gap:8px;
    padding:7px 13px;border-radius:999px;background:var(--card);border:1px solid var(--line);
    font-weight:700;font-size:12.5px;letter-spacing:.4px;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint)}
  .status.live .dot{background:var(--live);box-shadow:0 0 0 0 rgba(255,75,87,.6);animation:pulse 1.4s infinite}
  .status.live{color:#ffd7db;border-color:rgba(255,75,87,.4)}
  .status.done{color:#bff0dd;border-color:rgba(51,214,159,.4)}
  .status.done .dot{background:var(--ok);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,75,87,.55)}70%{box-shadow:0 0 0 10px rgba(255,75,87,0)}100%{box-shadow:0 0 0 0 rgba(255,75,87,0)}}

  h1{font-size:26px;line-height:1.15;margin:0 2px 2px;font-weight:800;letter-spacing:-.3px}
  .sub{color:var(--dim);margin:0 2px 20px;font-size:14px}

  /* Elapsed hero */
  .elapsed{display:flex;align-items:baseline;gap:10px;margin:0 2px 22px}
  .elapsed .big{font-variant-numeric:tabular-nums;font-weight:800;font-size:44px;letter-spacing:-1px;line-height:1}
  .elapsed .lab{color:var(--faint);font-size:12px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}

  /* Progress bar */
  .prog{margin:0 2px 22px}
  .prog .track{height:12px;border-radius:999px;background:var(--inset);border:1px solid var(--line);overflow:hidden;position:relative}
  .prog .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;width:0;transition:width .6s ease}
  .prog .meta{display:flex;justify-content:space-between;margin-top:8px;color:var(--dim);font-size:13px;font-variant-numeric:tabular-nums}
  .prog .meta b{color:var(--text)}

  /* Stat grid */
  .grid{display:grid;gap:12px;margin:0 0 12px}
  .grid.primary{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
  .grid.metrics{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:20px}
  /* Measurement toggle pills over the course profile */
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;
    background:var(--inset);border:1px solid var(--line);color:var(--dim);font:700 12px/1 inherit;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
  .pill.on{background:var(--card2);border-color:var(--accent);color:var(--text)}
  .pdot{width:8px;height:8px;border-radius:50%}
  /* Light / dark / system control */
  .theme{margin-left:auto;display:inline-flex;gap:2px;padding:3px;border-radius:999px;background:var(--card);border:1px solid var(--line)}
  .theme button{border:0;background:transparent;color:var(--dim);font:700 12px/1 inherit;padding:5px 8px;min-width:30px;border-radius:999px;cursor:pointer;transition:background .15s,color .15s}
  .theme button.on{background:var(--card2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;position:relative;overflow:hidden}
  .stat .k{color:var(--faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;align-items:center;gap:6px}
  .stat .v{font-weight:800;font-size:26px;letter-spacing:-.5px;margin-top:6px;font-variant-numeric:tabular-nums;line-height:1.05}
  .stat .u{font-size:14px;color:var(--dim);font-weight:600;margin-left:3px}
  .stat .sub2{color:var(--faint);font-size:12px;margin-top:3px;font-variant-numeric:tabular-nums}
  .stat .ic{width:8px;height:8px;border-radius:50%}
  .stat.accent{background:linear-gradient(180deg,var(--card2),var(--card))}
  .cardpin{position:absolute;top:7px;right:7px;z-index:2;font-size:15px;line-height:1;text-decoration:none;padding:4px;border-radius:8px;opacity:.9}
  .cardpin:active{opacity:.55}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:0 0 16px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);font-weight:800;display:flex;align-items:center;gap:8px}
  .card h2 .r{margin-left:auto;color:var(--faint);font-weight:600;text-transform:none;letter-spacing:0;font-size:12.5px}

  #map{height:230px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--inset)}
  .leaflet-container{background:var(--inset)}
  .pin{width:16px;height:16px;border-radius:50%;background:var(--live);border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,75,87,.3),0 2px 6px rgba(0,0,0,.5)}

  /* Elevation profile */
  .profile{width:100%;height:150px;display:block}
  .profwrap{position:relative;touch-action:none}
  .scrubtip{position:absolute;top:4px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:5px 9px;font:700 12px/1.35 inherit;white-space:nowrap;pointer-events:none;box-shadow:var(--shadow);z-index:5}
  .scrubtip.hidden{display:none}
  .profile .fillp{fill:url(#pg)}
  .profile .linep{fill:none;stroke:var(--accent2);stroke-width:2}
  .profile .cp{fill:var(--faint)}
  .profile .cp.done{fill:var(--ok)}
  .profile .me{fill:var(--live);stroke:#fff;stroke-width:2}
  .profile .melabel{fill:var(--text);font:700 11px sans-serif}

  .foot{color:var(--faint);font-size:12.5px;text-align:center;margin-top:26px;line-height:1.7}
  .adminbar{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0 30px}
  .adminbar.hidden{display:none}
  .adminlbl{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--dim);font:700 12px/1 inherit;padding:6px 12px;border-radius:999px;cursor:pointer}
  .seg button.on{background:var(--card2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}
  .foot .live-age{font-variant-numeric:tabular-nums}

  /* States */
  .center{min-height:70vh;display:grid;place-items:center;text-align:center;padding:24px}
  .center .glyph{font-size:40px;margin-bottom:10px}
  .center h2{font-size:20px;margin:0 0 8px}
  .center p{color:var(--dim);max-width:340px;margin:0 auto}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent2);animation:sp .8s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .stale{opacity:.55}
</style>
</head>
<body>
<div class="wrap">
  <!-- Loading -->
  <div id="loading" class="center">
    <div><div class="spin"></div><p>Finding the race…</p></div>
  </div>

  <!-- Error / not found -->
  <div id="error" class="center hidden">
    <div>
      <div class="glyph">🏳️</div>
      <h2 id="err-title">Race not found</h2>
      <p id="err-msg">This tracking link is invalid, private, or the race has ended and sharing was turned off.</p>
    </div>
  </div>

  <!-- Main -->
  <div id="app" class="hidden">
    <div class="top">
      <div class="brand"><b>Dromeas</b> · Live</div>
      <div class="theme" id="theme" role="group" aria-label="Theme">
        <button type="button" data-t="system" title="Follow system">Auto</button>
        <button type="button" data-t="light" title="Light" aria-label="Light">☀</button>
        <button type="button" data-t="dark" title="Dark" aria-label="Dark">☾</button>
      </div>
      <div id="status" class="status"><span class="dot"></span><span id="status-t">—</span></div>
    </div>

    <h1 id="race-name">—</h1>
    <p class="sub" id="race-sub">—</p>

    <div class="elapsed">
      <span class="big" id="elapsed">0:00:00</span>
      <span class="lab" id="elapsed-lab">Elapsed</span>
    </div>

    <div class="prog">
      <div class="track"><div class="fill" id="prog-fill"></div></div>
      <div class="meta">
        <span><b id="cur-km">0.0</b> km</span>
        <span><b id="pct">0</b>%</span>
        <span>of <b id="tot-km">0</b> km</span>
      </div>
    </div>

    <div class="grid primary" id="stats-primary"></div>
    <div class="grid metrics" id="stats-metrics"></div>

    <div class="card" id="map-card">
      <h2>Location <span class="r" id="map-r"></span></h2>
      <div id="map"></div>
    </div>

    <div class="card">
      <h2>Course profile <span class="r">press &amp; hold to inspect</span></h2>
      <div class="pills" id="prof-pills"></div>
      <div class="profwrap">
        <svg class="profile" id="profile" viewBox="0 0 1000 150" preserveAspectRatio="none"></svg>
        <div class="scrubtip hidden" id="scrubtip"></div>
      </div>
    </div>


    <div class="foot">
      <span id="age" class="live-age"></span><br/>
      Powered by <b>Dromeas</b> · Live race tracking
    </div>

    <div class="adminbar hidden" id="adminbar">
      <span class="adminlbl">Owner</span>
      <div class="seg" id="simseg">
        <button type="button" data-m="live">Live</button>
        <button type="button" data-m="sim">Simulation</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
"use strict";
/* ------------------------------------------------------------------ config */
const SUPABASE_URL = "https://dtpmhkjrmdssfejvoror.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0cG1oa2pybWRzc2ZlanZvcm9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODQzMDEsImV4cCI6MjA5OTc2MDMwMX0.MkbvgHUKD7Un9E6ia44-rObxaLtEsnxVM_LH1HLmtE8";
const TELEMETRY_MS = 4000;   // live position/HR poll
const PLAN_MS = 30000;       // plan refresh (checkpoint ticks / edits)

/* --------------------------------------------------------------- utilities */
const $ = (id) => document.getElementById(id);
const clamp = (v,a,b) => Math.min(b, Math.max(a, v));
const num = (v) => (typeof v === "number" && isFinite(v)) ? v : null;

function getToken(){
  const u = new URL(location.href);
  return u.searchParams.get("id") || u.searchParams.get("token") ||
         (location.hash ? location.hash.replace(/^#\/?/, "") : "") || "";
}

async function rpc(fn, body){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:"POST",
    headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error(`${fn} ${res.status}`);
  return res.json();
}

function fmtDur(sec){
  if(sec==null || !isFinite(sec) || sec<0) return "—";
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return h>0 ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
             : `${m}:${String(s).padStart(2,"0")}`;
}
function fmtDurShort(sec){
  if(sec==null || !isFinite(sec) || sec<0) return "—";
  const h=Math.floor(sec/3600), m=Math.round((sec%3600)/60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtPace(secPerKm){
  if(secPerKm==null || !isFinite(secPerKm) || secPerKm<=0) return "—";
  const m=Math.floor(secPerKm/60), s=Math.round(secPerKm%60);
  return `${m}:${String(s).padStart(2,"0")}`;
}

/* --------------------------------------------------- sim condition curves  */
/* Mirror of the app's SimConditions (demo / simulator mode only). */
const Sim = {
  temperature:(f)=> 18 + 8*Math.sin(f*2*Math.PI - Math.PI/2),
  humidity:(f)=> Math.min(92, Math.max(35, 64 - 24*Math.sin(f*2*Math.PI - Math.PI/2))),
  glucose:(f)=> Math.max(3.8, 6.3 - f*0.6 + 1.2*Math.sin(f*6*Math.PI)),
};

/* Interpolate the hourly forecast [{t,tempC,humidity}] at a UTC epoch (seconds). */
function forecastAt(hourly, tSec, field){
  if(!Array.isArray(hourly) || hourly.length<2) return null;
  if(tSec <= hourly[0].t) return hourly[0][field];
  if(tSec >= hourly[hourly.length-1].t) return hourly[hourly.length-1][field];
  for(let i=1;i<hourly.length;i++){
    const a=hourly[i-1], b=hourly[i];
    if(tSec <= b.t){
      const span = Math.max(b.t-a.t, 1);
      const g = (tSec-a.t)/span;
      return a[field] + (b[field]-a[field])*g;
    }
  }
  return hourly[hourly.length-1][field];
}

/* ------------------------------------------------------------- plan state  */
let PLAN=null, PTS=[], TOTKM=0, TOTMIN=0, MINE=0, MAXE=0, MAP=null, ROUTE=null, MEMARK=null, CPMARKS=[];
let LAST=null;         // last telemetry {km,bpm,elapsed_sec,updated_at,started_at,finished_at}
let AGE_TIMER=null;
let LAST_PACE=null;    // last valid pace (s/km), held through transient null ticks so the
let PREV_KM=null;      // projected finish + ETAs don't blink; both reset on a restart
let SCRUB=null, SCRUB_WIRED=false;   // press-and-hold profile scrubber (0..1 course fraction)
/* Profile overlays + theme. */
let HRHIST=[];  // {km,bpm} — accumulated client-side (server keeps only the latest row)
const SHOW={hr:false,temp:true,humid:false,gluc:false};
const MRANGE={temp:[-5,45],humid:[0,100],gluc:[3,12],hr:[40,200]};
const MCOLOR={temp:"--temp",humid:"--humid",gluc:"--gluc",hr:"--hr"};
const PILLDEFS=[{k:"hr",l:"HR",c:"--hr"},{k:"temp",l:"Temp",c:"--temp"},{k:"humid",l:"Humidity",c:"--humid"},{k:"gluc",l:"Glucose",c:"--gluc"}];
const THEME_KEY="dromeas_track_theme";

function totalKm(plan){
  if(PTS.length) return PTS[PTS.length-1].distanceKm || plan.distanceKm || 0;
  return plan.distanceKm || 0;
}
function totalMin(plan){
  return (plan.predictedHours||0)*60 + (plan.predictedMinutes||0) + (plan.predictedSeconds||0)/60;
}
/* Position (lat/lng/elev + normalized x) at a course km, interpolated on the track. */
function posAt(km){
  if(!PTS.length) return null;
  km = clamp(km, 0, TOTKM);
  if(km<=PTS[0].distanceKm) return PTS[0];
  for(let i=1;i<PTS.length;i++){
    if(km <= PTS[i].distanceKm){
      const a=PTS[i-1], b=PTS[i], span=Math.max(b.distanceKm-a.distanceKm,1e-6), g=(km-a.distanceKm)/span;
      return {
        distanceKm:km,
        latitude:a.latitude+(b.latitude-a.latitude)*g,
        longitude:a.longitude+(b.longitude-a.longitude)*g,
        elevationM:a.elevationM+(b.elevationM-a.elevationM)*g,
      };
    }
  }
  return PTS[PTS.length-1];
}

/* Measurement value at course fraction f (0..1): demo curves, or the hourly
   forecast mapped to predicted arrival time. Glucose is demo-only. */
function measAt(f){
  if(SIM || (PLAN && PLAN.simulatorMode)) return { temp:Sim.temperature(f), humid:Sim.humidity(f), gluc:Sim.glucose(f) };
  const base = (LAST && LAST.started_at) ? Date.parse(LAST.started_at)/1000 : Date.now()/1000;
  const t = base + f*(TOTMIN*60);
  return { temp:forecastAt(PLAN.hourlyWeather,t,"tempC"), humid:forecastAt(PLAN.hourlyWeather,t,"humidity"), gluc:null };
}

/* HR overlay points: the app-published series (the source device's full recorded
   trace) when present, else what this viewer accumulated since opening the link. */
function hrPoints(){
  const s = LAST && LAST.hr_series;
  if(Array.isArray(s) && s.length>1){
    return s.map(p => Array.isArray(p) ? {km:+p[0], bpm:+p[1]} : {km:+(p&&p.km), bpm:+(p&&p.bpm)})
            .filter(h => isFinite(h.km) && isFinite(h.bpm));
  }
  return HRHIST;
}

/* HR (bpm) interpolated at a course km, for the scrubber tooltip. */
function hrAtKm(km){
  const hp=hrPoints(); if(!hp.length) return null;
  if(km<=hp[0].km) return hp[0].bpm;
  for(let i=1;i<hp.length;i++){ if(km<=hp[i].km){ const a=hp[i-1],b=hp[i],g=(km-a.km)/Math.max(b.km-a.km,1e-6); return a.bpm+(b.bpm-a.bpm)*g; } }
  return hp[hp.length-1].bpm;
}

/* Press-and-hold scrubber on the course profile — reads out the data at the touched
   point (elevation + whichever overlays are on), like the in-app Event Chart. */
function wireScrub(){
  if(SCRUB_WIRED) return; SCRUB_WIRED=true;
  const svg=$("profile"), tip=$("scrubtip");
  const set=(e)=>{
    const rect=svg.getBoundingClientRect();
    const cx = e.clientX!=null ? e.clientX : (e.touches&&e.touches[0] ? e.touches[0].clientX : rect.left);
    const frac = clamp((cx-rect.left)/Math.max(rect.width,1), 0, 1);
    SCRUB = frac;
    drawProfile(LAST ? num(LAST.km) : null);
    const km=frac*TOTKM, sp=posAt(km), md=measAt(frac);
    const parts=[`<b>${km.toFixed(1)} km</b>`];
    if(sp) parts.push(`${Math.round(sp.elevationM)} m`);
    if(SHOW.temp && md.temp!=null)  parts.push(`<span style="color:var(--temp)">${Math.round(md.temp)}°</span>`);
    if(SHOW.humid && md.humid!=null) parts.push(`<span style="color:var(--humid)">${Math.round(md.humid)}%</span>`);
    if(SHOW.gluc && md.gluc!=null)  parts.push(`<span style="color:var(--gluc)">${md.gluc.toFixed(1)}</span>`);
    if(SHOW.hr){ const hh=hrAtKm(km); if(hh!=null) parts.push(`<span style="color:var(--hr)">${Math.round(hh)} bpm</span>`); }
    tip.innerHTML = parts.join(" · ");
    tip.style.left = Math.min(92, Math.max(8, frac*100)) + "%";
    tip.classList.remove("hidden");
  };
  const end=()=>{ if(SCRUB==null) return; SCRUB=null; drawProfile(LAST?num(LAST.km):null); tip.classList.add("hidden"); };
  svg.addEventListener("pointerdown", e=>{ e.preventDefault(); try{ svg.setPointerCapture(e.pointerId); }catch(_){} set(e); });
  svg.addEventListener("pointermove", e=>{ if(SCRUB!=null){ e.preventDefault(); set(e); } });
  ["pointerup","pointercancel","pointerleave"].forEach(ev=>svg.addEventListener(ev, end));
}

/* ------------------------------------------------------------ init / load  */
async function boot(){
  const token = getToken();
  if(!token){ return showError("No race selected","Open the tracking link you were given — it should end with ?id=…"); }
  try{
    const plan = await rpc("public_plan", {token});
    if(!plan || !plan.raceName){ return showError(); }
    setupPlan(plan);
    $("loading").classList.add("hidden");
    $("app").classList.remove("hidden");
    await tick();               // first telemetry
    fitMap(0);                  // fit the map once it has a real (non-zero) size
    setInterval(tick, TELEMETRY_MS);
    setInterval(refreshPlan, PLAN_MS);
    startAgeTimer();
  }catch(e){
    showError("Can’t reach the race","Check your connection and refresh. "+(e.message||""));
  }
}

function showError(title, msg){
  $("loading").classList.add("hidden"); $("app").classList.add("hidden");
  if(title) $("err-title").textContent = title;
  if(msg) $("err-msg").textContent = msg;
  $("error").classList.remove("hidden");
}

function setupPlan(plan){
  PLAN = plan;
  PTS = (plan.track && Array.isArray(plan.track.points)) ? plan.track.points.filter(p=>num(p.distanceKm)!=null) : [];
  TOTKM = totalKm(plan);
  TOTMIN = totalMin(plan);
  if(PTS.length){
    MINE = Math.min(...PTS.map(p=>p.elevationM));
    MAXE = Math.max(...PTS.map(p=>p.elevationM));
  }
  $("race-name").textContent = plan.raceName || "Race";
  document.title = (plan.raceName || "Race") + " · Live tracking";
  const startTxt = (plan.startHour!=null) ? `Start ${String(plan.startHour).padStart(2,"0")}:${String(plan.startMinute||0).padStart(2,"0")}` : "";
  const distTxt = TOTKM ? `${TOTKM.toFixed(TOTKM<100?1:0)} km` : "";
  const predTxt = TOTMIN ? `target ${fmtDurShort(TOTMIN*60)}` : "";
  $("race-sub").textContent = [distTxt, predTxt, startTxt].filter(Boolean).join("  ·  ");
  $("tot-km").textContent = TOTKM ? TOTKM.toFixed(TOTKM<100?1:0) : "0";
  if(plan.simulatorMode) { const s=$("status"); }
  drawProfile(null);
  renderPills();
  wirePills();
  wireScrub();
  initMap();
}

async function refreshPlan(){
  if(SIM) return;
  try{
    const token=getToken();
    const plan = await rpc("public_plan", {token});
    if(plan && plan.raceName){ PLAN=plan; }
  }catch(e){/* keep last */}
}

/* ----------------------------------------------------------------- tick    */
async function tick(){
  if(SIM) return;   // simulation drives LAST locally; don't clobber it with real telemetry
  try{
    const token=getToken();
    const rows = await rpc("public_telemetry", {token});
    const row = Array.isArray(rows) ? rows[0] : rows;
    LAST = row || LAST;
    render();
  }catch(e){/* keep last frame; age timer will flag staleness */}
}

function raceState(){
  if(!LAST) return "pending";
  const ms = s => { const t = s ? Date.parse(s) : NaN; return isFinite(t) ? t : null; };
  const started = ms(LAST.started_at), finished = ms(LAST.finished_at);
  // A finish only sticks if the run wasn't restarted after it: on a restart the new
  // startedAt is newer than a lingering finishedAt, so treat that as live, not done.
  if(finished!=null && !(started!=null && started>finished)) return "done";
  if(LAST.started_at) return "live";
  return "pending";
}

function render(){
  const st = raceState();
  const badge = $("status");
  badge.className = "status" + (st==="live"?" live":st==="done"?" done":"");
  $("status-t").textContent = st==="live" ? "Live" : st==="done" ? "Finished" : "Not started";

  const km = LAST ? num(LAST.km) : null;
  const elapsed = LAST ? num(LAST.elapsed_sec) : null;
  const hasPos = km!=null && PTS.length;

  // Elapsed
  $("elapsed").textContent = fmtDur(elapsed!=null ? elapsed : (st==="pending"?0:null));
  $("elapsed-lab").textContent = st==="done" ? "Finish time" : "Elapsed";

  // Progress
  const pct = (km!=null && TOTKM) ? clamp(km/TOTKM,0,1)*100 : 0;
  $("prog-fill").style.width = pct.toFixed(1)+"%";
  $("cur-km").textContent = km!=null ? km.toFixed(1) : "0.0";
  $("pct").textContent = Math.round(pct);

  // Derived. Detect a restart (km jumped backwards) and clear per-run accumulators so
  // stale pace/HR from the previous run don't bleed into the new one.
  if(km!=null){
    if(PREV_KM!=null && km < PREV_KM - 1){ LAST_PACE=null; HRHIST=[]; }
    PREV_KM = km;
  }
  const rawPace = (km!=null && km>0.05 && elapsed!=null && elapsed>0) ? elapsed/km : null;
  if(rawPace!=null && isFinite(rawPace) && rawPace>0) LAST_PACE = rawPace;
  // Hold the last good pace through transient null ticks so the projected finish and
  // the checkpoint ETAs stay put instead of flickering to "—".
  const secPerKm = rawPace ?? LAST_PACE;
  const totalSec = (secPerKm!=null && TOTKM) ? secPerKm*TOTKM : null;
  const remainSec = (totalSec!=null && elapsed!=null) ? Math.max(0, totalSec-elapsed) : null;
  const frac = (km!=null && TOTKM) ? clamp(km/TOTKM,0,1) : 0;

  // Conditions
  const sim = SIM || !!PLAN.simulatorMode;
  const nowSec = Date.now()/1000;
  let temp=null, humid=null, gluc=null;
  if(sim){ temp=Sim.temperature(frac); humid=Sim.humidity(frac); gluc=Sim.glucose(frac); }
  else{
    temp = forecastAt(PLAN.hourlyWeather, nowSec, "tempC");
    humid = forecastAt(PLAN.hourlyWeather, nowSec, "humidity");
    if(temp==null && num(PLAN.temperatureC)!=null) temp = PLAN.temperatureC; // daily fallback
  }
  const hr = LAST ? num(LAST.bpm) : null;

  // Headline row — pace, projected finish, distance, checkpoints (all highlighted).
  const cpsAll = PLAN.checkpoints || [];
  const cpStates = PLAN.checkpointStates || {};
  const cpDone = cpsAll.filter(cp => (cpStates[cp.id] && cpStates[cp.id].complete) || (km!=null && km>=cp.km)).length;
  const kmFmt = (v)=> v==null ? "—" : v.toFixed(TOTKM<100?1:0);
  const primary = [
    statCard("Pace", secPerKm!=null?fmtPace(secPerKm):"—", "/km", secPerKm!=null?`${(3600/secPerKm).toFixed(1)} km/h`:null, "accent"),
    st==="done" ? statCard("Total", fmtDur(elapsed), "", null, "accent")
                : statCard("Projected finish", totalSec!=null?fmtDur(totalSec):"—", "", remainSec!=null?`${fmtDurShort(remainSec)} to go`:null, "accent")
  ];
  if(TOTKM) primary.push(statCard("Distance", `${kmFmt(km!=null?km:0)}/${kmFmt(TOTKM)}`, "km", null, "accent"));
  if(cpsAll.length){
    const cpsSorted = cpsAll.slice().sort((a,b)=>a.km-b.km);
    const nextCp = cpsSorted.find(cp => !((cpStates[cp.id]&&cpStates[cp.id].complete) || (km!=null && km>=cp.km)));
    const cpSub = nextCp
      ? (km!=null ? `next in ${Math.max(0,nextCp.km-km).toFixed(1)} km` : `next at ${nextCp.km.toFixed(TOTKM<100?1:0)} km`)
      : "all cleared";
    let cpLink = null;
    if(nextCp){ const p = posAt(nextCp.km); if(p && isFinite(p.latitude) && isFinite(p.longitude)) cpLink = mapsLink(p.latitude, p.longitude); }
    primary.push(statCard("Checkpoints", `${cpDone}/${cpsAll.length}`, "", cpSub, "accent", null, cpLink));
  }
  $("stats-primary").innerHTML = primary.join("");

  // Conditions row.
  const metrics = [ statCard("Heart rate", hr!=null?hr:"—", "bpm", null, "", "--hr") ];
  if(temp!=null) metrics.push(statCard("Temp", Math.round(temp), "°C", sim?"demo":null, "", "--temp"));
  if(humid!=null) metrics.push(statCard("Humidity", Math.round(humid), "%", sim?"demo":null, "", "--humid"));
  if(gluc!=null) metrics.push(statCard("Glucose", gluc.toFixed(1), "mmol/L", "demo", "", "--gluc"));
  $("stats-metrics").innerHTML = metrics.join("");

  // Accumulate an HR-vs-distance trace for the profile overlay.
  if(st==="live" && km!=null && hr!=null){
    const lh=HRHIST[HRHIST.length-1];
    if(!lh || Math.abs(km-lh.km)>0.02) HRHIST.push({km, bpm:hr});
  }

  // Map + profile marker
  updateMap(km);
  drawProfile(km);
  updateAge();
}

function statCard(k, v, u, sub2, cls, dotVar, link){
  const dot = dotVar ? `<span class="ic" style="background:var(${dotVar})"></span>` : "";
  const pin = link ? `<a class="cardpin" href="${link}" target="_blank" rel="noopener" aria-label="Open next checkpoint in Maps">📍</a>` : "";
  return `<div class="stat ${cls||""}">
    ${pin}<div class="k">${dot}${k}</div>
    <div class="v">${v}<span class="u">${u||""}</span></div>
    ${sub2?`<div class="sub2">${sub2}</div>`:""}
  </div>`;
}

/* Cross-platform "open in maps" link — Apple Maps on Apple devices, else Google. */
function mapsLink(lat, lng){
  const q = `${(+lat).toFixed(6)},${(+lng).toFixed(6)}`;
  const apple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
  return apple ? `https://maps.apple.com/?ll=${q}&q=Checkpoint` : `https://www.google.com/maps/search/?api=1&query=${q}`;
}

/* --------------------------------------------------------------- profile   */
function drawProfile(km){
  const svg=$("profile"); if(!PTS.length){ svg.innerHTML=""; return; }
  const W=1000,H=150,pad=14;
  const span = Math.max(MAXE-MINE, 1);
  const X = (d)=> (clamp(d/Math.max(TOTKM,1e-6),0,1))*W;
  const Y = (e)=> H-pad - ((e-MINE)/span)*(H-2*pad);
  // downsample for path
  const step = Math.max(1, Math.floor(PTS.length/900));
  let line=`M ${X(PTS[0].distanceKm).toFixed(1)} ${Y(PTS[0].elevationM).toFixed(1)}`;
  for(let i=step;i<PTS.length;i+=step){ line+=` L ${X(PTS[i].distanceKm).toFixed(1)} ${Y(PTS[i].elevationM).toFixed(1)}`; }
  const last=PTS[PTS.length-1]; line+=` L ${X(last.distanceKm).toFixed(1)} ${Y(last.elevationM).toFixed(1)}`;
  const area = `${line} L ${W} ${H} L 0 ${H} Z`;

  // checkpoint ticks
  const states = PLAN.checkpointStates||{};
  let cpm="";
  (PLAN.checkpoints||[]).forEach(cp=>{
    const p=posAt(cp.km); if(!p) return;
    const done = (states[cp.id] && states[cp.id].complete) || (km!=null && km>=cp.km);
    cpm += `<circle class="cp ${done?"done":""}" cx="${X(cp.km).toFixed(1)}" cy="${Y(p.elevationM).toFixed(1)}" r="3.2"/>`;
  });

  // you-are-here
  let me="";
  if(km!=null){
    const p=posAt(km);
    me = `<line x1="${X(km).toFixed(1)}" y1="0" x2="${X(km).toFixed(1)}" y2="${H}" stroke="rgba(255,75,87,.35)" stroke-width="1"/>
          <circle class="me" cx="${X(km).toFixed(1)}" cy="${Y(p.elevationM).toFixed(1)}" r="5"/>`;
  }

  // Measurement overlays (toggled by the pills). Each series is normalized to its
  // own range so they can share the elevation chart's height — same idea as the
  // in-app Event Chart.
  const Ym=(v,r)=>H-pad-clamp((v-r[0])/(r[1]-r[0]),0,1)*(H-2*pad);
  const sampledTrace=(key,valFn)=>{
    let d="",on=false;
    for(let i=0;i<=120;i++){ const f=i/120, v=valFn(f);
      if(v==null||!isFinite(v)){ on=false; continue; }
      d+=(on?" L ":" M ")+(f*W).toFixed(1)+" "+Ym(v,MRANGE[key]).toFixed(1); on=true; }
    return d?`<path d="${d}" fill="none" stroke="var(${MCOLOR[key]})" stroke-width="2" stroke-linejoin="round" opacity=".9"/>`:"";
  };
  let ov="";
  if(SHOW.temp)  ov+=sampledTrace("temp",  f=>measAt(f).temp);
  if(SHOW.humid) ov+=sampledTrace("humid", f=>measAt(f).humid);
  if(SHOW.gluc)  ov+=sampledTrace("gluc",  f=>measAt(f).gluc);
  if(SHOW.hr){
    const hp = hrPoints();
    if(hp.length>1){
      let d="",on=false;
      for(const h of hp){ d+=(on?" L ":" M ")+(clamp(h.km/Math.max(TOTKM,1e-6),0,1)*W).toFixed(1)+" "+Ym(h.bpm,MRANGE.hr).toFixed(1); on=true; }
      ov+=`<path d="${d}" fill="none" stroke="var(--hr)" stroke-width="2" stroke-linejoin="round" opacity=".9"/>`;
    }
  }

  // press-and-hold scrubber marker: a dashed line + dots at the touched km.
  let scr="";
  if(SCRUB!=null){
    const sx=SCRUB*W, sp=posAt(SCRUB*TOTKM), md=measAt(SCRUB);
    scr = `<line x1="${sx.toFixed(1)}" y1="0" x2="${sx.toFixed(1)}" y2="${H}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3 3"/>`;
    if(sp) scr += `<circle cx="${sx.toFixed(1)}" cy="${Y(sp.elevationM).toFixed(1)}" r="3.6" fill="var(--accent2)" stroke="var(--card)" stroke-width="1.5"/>`;
    if(SHOW.temp && md.temp!=null)  scr+=`<circle cx="${sx.toFixed(1)}" cy="${Ym(md.temp,MRANGE.temp).toFixed(1)}" r="3" fill="var(--temp)"/>`;
    if(SHOW.humid && md.humid!=null) scr+=`<circle cx="${sx.toFixed(1)}" cy="${Ym(md.humid,MRANGE.humid).toFixed(1)}" r="3" fill="var(--humid)"/>`;
    if(SHOW.gluc && md.gluc!=null)  scr+=`<circle cx="${sx.toFixed(1)}" cy="${Ym(md.gluc,MRANGE.gluc).toFixed(1)}" r="3" fill="var(--gluc)"/>`;
    if(SHOW.hr){ const hh=hrAtKm(SCRUB*TOTKM); if(hh!=null) scr+=`<circle cx="${sx.toFixed(1)}" cy="${Ym(hh,MRANGE.hr).toFixed(1)}" r="3" fill="var(--hr)"/>`; }
  }

  svg.innerHTML = `
    <defs><linearGradient id="pg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2f7df6" stop-opacity=".38"/>
      <stop offset="1" stop-color="#2f7df6" stop-opacity="0"/>
    </linearGradient></defs>
    <path class="fillp" d="${area}"/>
    <path class="linep" d="${line}"/>
    ${ov}${cpm}${scr}${me}`;
}

/* ----------------------------------------------------------------- map     */
function initMap(){
  if(!window.L || !PTS.length){ $("map-card").classList.add("hidden"); return; }
  const latlngs = PTS.map(p=>[p.latitude,p.longitude]);
  MAP = L.map("map",{zoomControl:true, attributionControl:true, scrollWheelZoom:false});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:18, attribution:'&copy; OpenStreetMap'
  }).addTo(MAP);
  ROUTE = L.polyline(latlngs,{color:"#4f9dff",weight:4,opacity:.9}).addTo(MAP);
  // start / finish
  L.circleMarker(latlngs[0],{radius:5,color:"#33d69f",fillColor:"#33d69f",fillOpacity:1}).addTo(MAP);
  L.circleMarker(latlngs[latlngs.length-1],{radius:5,color:"#fff",fillColor:"#2f7df6",fillOpacity:1}).addTo(MAP);
  // checkpoints
  (PLAN.checkpoints||[]).forEach(cp=>{
    const p=posAt(cp.km); if(!p) return;
    CPMARKS.push(L.circleMarker([p.latitude,p.longitude],{radius:4,color:"#9fb0cc",fillColor:"#131f36",fillOpacity:1,weight:2}).addTo(MAP)
      .bindTooltip(`CP · ${cp.km.toFixed(1)} km`));
  });
  MAP.fitBounds(ROUTE.getBounds().pad(0.12), {maxZoom:15});
  // Some renderers give below-the-fold elements zero width, so a load-time fit
  // lands at zoom 0. Re-fit the first time the map actually enters the viewport,
  // when it's guaranteed real layout.
  if('IntersectionObserver' in window){
    let done=false;
    const io=new IntersectionObserver((ents)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ MAP.invalidateSize();
        if(!done && ROUTE){ MAP.fitBounds(ROUTE.getBounds().pad(0.15),{maxZoom:15}); done=true; } } });
    },{threshold:0.15});
    io.observe(document.getElementById('map'));
  }
}
/* Off-screen / pre-layout, the map can report no size and fit to zoom 0 (whole
   world). Re-fit and retry until the zoom is sane. */
function fitMap(tries){
  if(!MAP || !ROUTE) return;
  MAP.invalidateSize();
  MAP.fitBounds(ROUTE.getBounds().pad(0.15), {maxZoom:15});
  if(MAP.getZoom() <= 1 && (tries||0) < 10) setTimeout(()=>fitMap((tries||0)+1), 250);
}
function updateMap(km){
  if(!MAP) return;
  if(km==null){ if(MEMARK){MAP.removeLayer(MEMARK);MEMARK=null;} return; }
  const p=posAt(km); if(!p) return;
  const ll=[p.latitude,p.longitude];
  if(!MEMARK){
    MEMARK = L.marker(ll,{icon:L.divIcon({className:"",html:'<div class="pin"></div>',iconSize:[16,16],iconAnchor:[8,8]})}).addTo(MAP);
  } else MEMARK.setLatLng(ll);
}

/* --------------------------------------------------------------- age       */
function startAgeTimer(){ if(AGE_TIMER) clearInterval(AGE_TIMER); AGE_TIMER=setInterval(updateAge,1000); }
function updateAge(){
  if(!LAST || !LAST.updated_at){ $("age").textContent=""; return; }
  const t=Date.parse(LAST.updated_at); if(isNaN(t)){ $("age").textContent=""; return; }
  const sec=Math.max(0,(Date.now()-t)/1000);
  const st=raceState();
  const stale = st==="live" && sec>25;
  $("app").classList.toggle("stale", stale);
  if(st==="done") $("age").textContent = "Race complete";
  else if(st==="pending") $("age").textContent = "Waiting for the start";
  else $("age").innerHTML = stale ? `Signal paused · last update ${fmtDurShort(sec)} ago`
                                  : `Live · updated ${sec<5?"just now":Math.round(sec)+"s ago"}`;
  $("map-r").textContent = (st==="live" && !stale) ? "live" : "";
}

/* ------------------------------------------------------- profile overlays  */
function measAvail(){
  const sim=!!(PLAN&&PLAN.simulatorMode);
  const fc=!!(PLAN&&Array.isArray(PLAN.hourlyWeather)&&PLAN.hourlyWeather.length>1);
  return { hr:true, temp: sim||fc||num(PLAN&&PLAN.temperatureC)!=null, humid: sim||fc, gluc: sim };
}
function renderPills(){
  const a=measAvail();
  $("prof-pills").innerHTML = PILLDEFS.filter(p=>a[p.k]).map(p=>
    `<button type="button" class="pill ${SHOW[p.k]?"on":""}" data-k="${p.k}"><span class="pdot" style="background:var(${p.c})"></span>${p.l}</button>`
  ).join("");
}
let PILLS_WIRED=false;
function wirePills(){
  if(PILLS_WIRED) return; PILLS_WIRED=true;
  $("prof-pills").addEventListener("click",(e)=>{
    const b=e.target.closest(".pill"); if(!b) return;
    SHOW[b.dataset.k]=!SHOW[b.dataset.k];
    renderPills(); drawProfile(LAST?num(LAST.km):null);
  });
}

/* ----------------------------------------------------------------- theme   */
function resolvedTheme(pref){
  if(pref==="light"||pref==="dark") return pref;
  return (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
}
function applyTheme(){
  const pref = localStorage.getItem(THEME_KEY) || "system";
  const res = resolvedTheme(pref);
  document.documentElement.setAttribute("data-theme", res);
  const tc = document.querySelector('meta[name="theme-color"]');
  if(tc) tc.setAttribute("content", res==="light" ? "#eef3fb" : "#0b1220");
  const box=$("theme");
  if(box) box.querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.t===pref));
}
function wireTheme(){
  const box=$("theme"); if(!box) return;
  box.addEventListener("click",(e)=>{
    const b=e.target.closest("button"); if(!b) return;
    localStorage.setItem(THEME_KEY, b.dataset.t); applyTheme();
  });
  if(window.matchMedia){
    const mq=matchMedia("(prefers-color-scheme: light)");
    const on=()=>{ if((localStorage.getItem(THEME_KEY)||"system")==="system") applyTheme(); };
    mq.addEventListener ? mq.addEventListener("change",on) : mq.addListener(on);
  }
}

/* ---------------------------------------------- owner-only sim/live toggle  */
let SIM=false, SIM_T0=null, SIM_TIMER=null, SIM_HR=[];
const ADMIN_KEY="dromeas_track_admin";

/* No login on this page, so `?admin=1` (remembered in localStorage) reveals the
   toggle; `?admin=0` clears it. */
function isAdmin(){
  try{
    const u=new URL(location.href);
    if(u.searchParams.get("admin")==="1") localStorage.setItem(ADMIN_KEY,"1");
    if(u.searchParams.get("admin")==="0") localStorage.removeItem(ADMIN_KEY);
    return localStorage.getItem(ADMIN_KEY)==="1";
  }catch(e){ return false; }
}

/* Self-contained synthetic plan so the demo works even without a real token. */
function syntheticPlan(){
  const N=80, pts=[];
  for(let i=0;i<=N;i++){ const f=i/N;
    pts.push({distanceKm:f*42.2, latitude:37.98+f*0.12, longitude:23.72+Math.sin(f*3)*0.03,
      elevationM:60+180*(0.5-0.5*Math.cos(f*Math.PI*3))+30*Math.sin(f*9)}); }
  const cps=[]; for(let i=1;i<=8;i++) cps.push({id:"scp"+i, km:i*42.2/9, pinned:i%2===0});
  return { raceName:"Demo Marathon", distanceKm:42.2, simulatorMode:true,
    startHour:8, startMinute:0, predictedHours:3, predictedMinutes:30, predictedSeconds:0,
    track:{points:pts}, checkpoints:cps, checkpointStates:{} };
}

/* One frame of the slow demo: advance a fake runner over the whole course in ~10 min,
   at a realistic pace so the pace/finish readouts stay sensible. */
function simFrame(){
  if(!SIM) return;
  const DEMO_SECS=600;
  const el=(Date.now()-SIM_T0)/1000, frac=Math.min(1, el/DEMO_SECS), km=frac*TOTKM;
  const pace=(TOTMIN*60)/Math.max(TOTKM,1e-6);
  const bpm=Math.round(138+18*Math.sin(el/9)+8*frac);
  if(!SIM_HR.length || Math.abs(km-SIM_HR[SIM_HR.length-1][0])>TOTKM/120) SIM_HR.push([+km.toFixed(2), bpm]);
  LAST={ km, bpm, elapsed_sec:km*pace, updated_at:new Date().toISOString(),
         started_at:new Date(SIM_T0).toISOString(),
         finished_at: frac>=1 ? new Date().toISOString() : null, hr_series:SIM_HR };
  render();
}

function setSim(on){
  SIM=on;
  document.querySelectorAll("#simseg button").forEach(b=>b.classList.toggle("on", (b.dataset.m==="sim")===on));
  if(on){
    if(!PLAN) setupPlan(syntheticPlan());
    SIM_T0=Date.now(); SIM_HR=[]; PREV_KM=null; LAST_PACE=null; HRHIST=[];
    $("loading").classList.add("hidden"); $("error").classList.add("hidden"); $("app").classList.remove("hidden");
    if(SIM_TIMER) clearInterval(SIM_TIMER);
    SIM_TIMER=setInterval(simFrame, 1000); simFrame();
  } else {
    if(SIM_TIMER){ clearInterval(SIM_TIMER); SIM_TIMER=null; }
    SIM_HR=[]; PREV_KM=null; LAST_PACE=null; HRHIST=[];
    tick();   // resume real telemetry
  }
}

function wireAdmin(){
  if(!isAdmin()) return;
  $("adminbar").classList.remove("hidden");
  document.querySelector('#simseg button[data-m="live"]').classList.add("on");
  $("simseg").addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b) return; setSim(b.dataset.m==="sim"); });
}

applyTheme();
wireTheme();
wireAdmin();
boot();
</script>
</body>
</html>
